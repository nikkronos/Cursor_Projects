name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        pytest tests/ -v || true
        python -m pytest tests/test_utils_retry.py -v || true
        python -m pytest tests/test_validators.py -v || true
        python -m pytest tests/test_handlers_structure.py -v || true

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deploy to server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          cd ${{ secrets.DEPLOY_PATH }}
          git pull origin main
          pip3 install -r requirements.txt --break-system-packages || true
          if [ -d "xxx" ]; then
            pip3 install -r xxx/requirements.txt --break-system-packages || true
            sudo systemctl restart kopiya-iksuyemsya.service || true
          fi
          sudo systemctl restart tradetherapybot.service || true
          sleep 5
          sudo systemctl status tradetherapybot.service --no-pager || true
          if [ -d "xxx" ]; then
            sudo systemctl status kopiya-iksuyemsya.service --no-pager || true
          fi
