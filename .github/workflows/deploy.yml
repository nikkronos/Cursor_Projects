name: Deploy to Server

on:
  workflow_run:
    workflows: ["Run Tests"]
    types:
      - completed
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
        
    - name: Add server to known hosts
      run: |
        ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
        
    - name: Create backup directory
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        port: ${{ secrets.SSH_PORT }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          mkdir -p ${{ secrets.DEPLOY_PATH }}/backups
          
    - name: Backup database
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        port: ${{ secrets.SSH_PORT }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ${{ secrets.DEPLOY_PATH }}
          if [ -f bot.db ]; then
            BACKUP_FILE="backups/bot_$(date +%Y%m%d_%H%M%S).db"
            cp bot.db "$BACKUP_FILE"
            echo "Database backed up to $BACKUP_FILE"
            # Keep only last 10 backups
            ls -t backups/bot_*.db | tail -n +11 | xargs -r rm
          else
            echo "No database file found, skipping backup"
          fi
          
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        port: ${{ secrets.SSH_PORT }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ${{ secrets.DEPLOY_PATH }}
          
          # Check if git repo exists
          if [ ! -d .git ]; then
            echo "Git repository not found. Initializing..."
            git init
            git remote add origin https://github.com/${{ github.repository }}.git || true
          fi
          
          # Fetch and reset to latest commit
          git fetch origin
          git reset --hard origin/main || git reset --hard origin/master
          
          # Check if requirements.txt changed
          if git diff HEAD@{1} HEAD --name-only | grep -q requirements.txt || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Requirements changed, installing dependencies..."
            pip3 install --break-system-packages -r requirements.txt
          fi
          
    - name: Restart service
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        port: ${{ secrets.SSH_PORT }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          systemctl restart ${{ secrets.SERVICE_NAME }}.service
          sleep 2
          systemctl status ${{ secrets.SERVICE_NAME }}.service --no-pager
