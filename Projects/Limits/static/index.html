<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Лимиты — заявки Т-Инвестиции</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="widget">
    <h1>Лимиты</h1>

    <section class="instrument">
      <label>Инструмент</label>
      <div class="instrument-row">
        <input type="text" id="search" placeholder="Поиск по тикеру или названию..." autocomplete="off">
        <label class="fav-label"><input type="checkbox" id="favOnly"> Только избранные</label>
      </div>
      <select id="instruments" size="5"></select>
      <p class="current-instrument" id="currentInstrument">—</p>
    </section>

    <section class="price">
      <label>Текущая цена</label>
      <p class="price-value" id="currentPrice">—</p>
      <p class="price-meta" id="priceMeta">Обновление раз в 10 сек</p>
    </section>

    <section class="params">
      <label>Сумма (₽)</label>
      <input type="number" id="totalRub" min="1" step="1000" placeholder="200000">
      <label>Количество заявок</label>
      <input type="number" id="count" min="1" max="20" value="4" placeholder="4">
      <label>Шаг (%)</label>
      <input type="number" id="stepPct" min="0.01" step="0.1" value="2" placeholder="2">
    </section>

    <section class="actions">
      <button type="button" id="btnBuy" class="btn btn-buy" title="Лимитные покупки ниже текущей цены">Покупка ниже</button>
      <button type="button" id="btnSell" class="btn btn-sell" title="Лимитные продажи выше текущей цены">Продажа выше</button>
    </section>

    <section class="log" id="log"></section>
  </div>
  <script src="app.js"></script>
</body>
</html>
